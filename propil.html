<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil - TK Nurul Ikhlas</title>
    <style>
        :root {
            --biru: #4A90E2; --pink: #FF85A1; --kuning: #FFD93D; --hijau: #6BCB77;
        }
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif; margin: 0;
            background: #fffbe6; color: #333; display: flex; flex-direction: column; align-items: center;
        }
        header {
            width: 100%; padding: 15px 30px; background: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); box-sizing: border-box;
            position: sticky; top: 0; z-index: 100; display: flex; align-items: center;
        }
        .btn-kembali {
            text-decoration: none; background: var(--biru); color: white;
            padding: 10px 25px; border-radius: 50px; font-weight: bold;
            box-shadow: 0 4px 0px #2a6cb3; transition: 0.2s;
        }
        .btn-kembali:active { transform: translateY(4px); box-shadow: none; }
        .judul-halaman { flex-grow: 1; text-align: center; font-size: 1.5rem; color: var(--biru); margin: 0; padding-right: 100px; }
        .container {
            width: 90%; max-width: 850px; background: white; margin: 40px 0;
            border-radius: 40px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 8px solid var(--kuning); box-sizing: border-box;
        }
        .foto-utama-box {
            width: 100%; height: 350px; background: #f0f0f0; border-radius: 30px;
            overflow: hidden; border: 6px solid #fff; box-shadow: 0 8px 20px rgba(0,0,0,0.1); margin-bottom: 35px;
        }
        .foto-utama-box img { width: 100%; height: 100%; object-fit: cover; }
        h1 { color: var(--biru); text-align: center; font-size: 2.8rem; margin: 0; text-shadow: 2px 2px 0px #f0f0f0; }
        .slogan { text-align: center; color: var(--pink); font-weight: bold; font-size: 1.2rem; margin-bottom: 30px; }
        p.deskripsi { line-height: 1.8; font-size: 1.15rem; color: #555; text-align: justify; }
        .visi-misi-section { background: #f0f7fa; padding: 30px; border-radius: 30px; margin: 35px 0; border-left: 10px solid var(--biru); }
        h2 { color: var(--pink); margin-top: 0; font-size: 1.8rem; }
        ul { padding-left: 20px; line-height: 1.8; font-size: 1.1rem; }
        li { margin-bottom: 10px; }
        .gallery-title { color: var(--hijau); border-left: 10px solid var(--hijau); padding-left: 15px; font-size: 1.8rem; margin-top: 40px; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-top: 20px; }
        .gallery-item { background: #f9f9f9; height: 180px; border-radius: 20px; overflow: hidden; border: 4px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.08); transition: 0.3s; }
        .gallery-item:hover { transform: scale(1.05) rotate(2deg); }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
        .kontak-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 40px; padding-top: 30px; border-top: 4px dashed #eee; text-align: center; }
        .kontak-card { background: #fff9e6; padding: 15px; border-radius: 20px; }
        .kontak-card span { font-size: 2.5rem; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="btn-kembali">⬅ Menu Utama</a>
        <h2 class="judul-halaman">Profil Sekolah</h2>
    </header>

    <div class="container">
        <div class="foto-utama-box">
            <img id="renderFotoUtama" src="" alt="Gedung Sekolah">
        </div>

        <h1 id="renderNama"></h1>
        <div class="slogan" id="renderSlogan"></div>
        <p class="deskripsi" id="renderDeskripsi"></p>

        <div class="visi-misi-section">
            <h2 style="color: var(--biru);">🌟 Visi Sekolah</h2>
            <p style="font-size: 1.2rem; font-style: italic;" id="renderVisi"></p>
            
            <h2 style="color: var(--biru); margin-top: 30px;">🚀 Misi Sekolah</h2>
            <ul id="renderMisi"></ul>
        </div>

        <h2 class="gallery-title">📸 Kegiatan Seru Kami</h2>
        <div class="gallery-grid" id="renderGallery"></div>

        <div class="kontak-grid">
            <div class="kontak-card"><span>📍</span><strong>Alamat</strong><p id="renderAlamat"></p></div>
            <div class="kontak-card"><span>📞</span><strong>Telepon</strong><p id="renderTelepon"></p></div>
            <div class="kontak-card"><span>⏰</span><strong>Jam Belajar</strong><p id="renderJam"></p></div>
        </div>
    </div>

    <p style="color: #bbb; margin-bottom: 40px; font-size: 0.9rem;">© 2026 Dashboard Sekolah Anak</p>

    <script src="data.js"></script>
    <script>
        // Proses otomatis memasukkan data dari data.js ke halaman HTML
        document.getElementById('renderNama').innerText = dataProfil.namaSekolah;
        document.getElementById('renderSlogan').innerText = dataProfil.slogan;
        document.getElementById('renderDeskripsi').innerHTML = dataProfil.deskripsi;
        document.getElementById('renderVisi').innerText = dataProfil.visi;
        
        const imgUtama = document.getElementById('renderFotoUtama');
        imgUtama.src = dataProfil.fotoUtama;
        imgUtama.onerror = () => { imgUtama.src = 'https://images.unsplash.com/photo-1544717297-fa95b3ee51f8?auto=format&fit=crop&w=1000&q=80'; };

        const misiList = document.getElementById('renderMisi');
        dataProfil.misi.forEach(m => {
            misiList.innerHTML += `<li>${m}</li>`;
        });

        const galleryGrid = document.getElementById('renderGallery');
        const backupImg = [
            'https://images.unsplash.com/photo-1503676260728-1c00da094a0b?auto=format&fit=crop&w=500&q=80',
            'https://images.unsplash.com/photo-1516627145497-ae6968895b74?auto=format&fit=crop&w=500&q=80',
            'https://images.unsplash.com/photo-1596461404969-9ae70f2830c1?auto=format&fit=crop&w=500&q=80'
        ];
        
        dataProfil.galleryKegiatan.forEach((foto, i) => {
            galleryGrid.innerHTML += `
                <div class="gallery-item">
                    <img src="${foto}" onerror="this.src='${backupImg[i] || backupImg[0]}'">
                </div>`;
        });

        document.getElementById('renderAlamat').innerText = dataProfil.kontak.alamat;
        document.getElementById('renderTelepon').innerText = dataProfil.kontak.telepon;
        document.getElementById('renderJam').innerHTML = dataProfil.kontak.jamBelajar;
    </script>
</body>
</html>
